<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>table</title>
<style>
	body { 
		background: whitesmoke;
	} #page{  
		width: 1024px;

		background: white;

		border: 1px solid dimgray;

	} table { 
		margin: 48px auto;
		font: 14pt/1.4em;
	} td { 
		padding: 6px 12px; 
	} tr:nth-child(odd) {
		background:  #C5E4FF
	}

</style>
</head>

        </tr>
        <tr>

            <td>Row 1, Column 3</td>
        </tr>
        <tr>
            <td> Concert poster</td>
            <td>Row 2, Column 2</td>
            <td>Row 2, Column 3</td>
        </tr>
        <tr>
            <td> Soda Logo</td>
            <td>Row 3, Column 2</td>

</html>
