<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>table</title>
<style>
	body { 
		background: whitesmoke;
	} #page{  
		width: 1024px;
		height: 1228px;
		background: white;
		margin: 0 auto;
		border: 1px solid dimgray;
		box-shadow: 2px 3px 6px rgb(232, 255, 226);
	} table { 
		margin: 48px auto;
		font: 14pt/1.4em Candera; 
        border-collapse: collapse; 
        border: 1px solid rgb(255, 242, 237);
        box-shadow: 2px 3px 6px dimgray;
	} td, th { 
		padding: 6px 12px; 
	} tr:nth-child(odd) {
		background:  #ffe5c5
	}

</style>
</head>

<body>
	<div id="page">
    <table>
        <tr>
            <th colspan="3"> Artwork and data </th>
        </tr>
        <tr>
            <th> Art</th>
            <th> file format</th>
            <th> file size</th>
        </tr>
        <tr>
            <td> Daisy</td>
            <td>Row 1, Column 2</td>
            <td>Row 1, Column 3</td>
        </tr>
        <tr>
            <td> Concert poster</td>
            <td>Row 2, Column 2</td>
            <td>Row 2, Column 3</td>
        </tr>
        <tr>
            <td> Soda Logo</td>
            <td>Row 3, Column 2</td>
            <td>Row 3, Column 3</td>
        </tr>
    </table> 
	</div>
</body>
</html>
